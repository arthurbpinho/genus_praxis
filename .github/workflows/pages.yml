name: Deploy front (GitHub Pages)

# ATENÇÃO: o GitHub Pages hospeda SÓ o front (arquivos estáticos). O backend
# (Express: login, dados, IA) precisa rodar em outro host. Defina a variável de
# repositório VITE_API_BASE com a URL pública do backend
# (Settings → Secrets and variables → Actions → Variables) para o front
# conseguir falar com a API. Sem ela, o site abre mas as chamadas de API falham.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependências do client
        working-directory: client
        run: npm ci || npm install
      - name: Build do client
        working-directory: client
        env:
          # Caminho base do projeto no Pages (https://<user>.github.io/genus_praxis/).
          # Ajuste se renomear o repositório.
          VITE_BASE: /genus_praxis/
          # Modo demonstração ON por padrão (front sem backend, dados fictícios).
          # Para usar um backend real: crie a variável VITE_DEMO=0 e defina VITE_API_BASE.
          VITE_DEMO: ${{ vars.VITE_DEMO || '1' }}
          # URL pública do backend (só usada quando VITE_DEMO=0).
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npx vite build
      - name: Fallback de SPA (404.html)
        run: cp client/dist/index.html client/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
